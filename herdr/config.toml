onboarding = false

[experimental]
kitty_graphics = true

[ui]
prompt_new_tab_name = false

[ui.toast]
delivery = "terminal"

[ui.sidebar.spaces]
row_gap = 1

[theme]
name = "vesper"
auto_switch = false

[keys]
previous_workspace = "prefix+shift+up"
next_workspace = "prefix+shift+down"

[[keys.command]]
key = "cmd+k"
type = "shell"
command = 'herdr pane run "$HERDR_ACTIVE_PANE_ID" clear'
description = "clear scrollback"
